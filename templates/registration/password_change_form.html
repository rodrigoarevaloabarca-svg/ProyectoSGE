{% extends 'base.html' %}
{% block titulo %}Cambiar Contraseña - SGE{% endblock %}
{% block main %}
<div class="max-w-lg mx-auto mt-8">
    <div class="flex items-center gap-3 mb-8">
        <a href="{% url 'usuarios:perfil' %}" class="text-muted-blue hover:text-primary transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2 class="text-3xl font-extrabold text-navy-deep dark:text-white">Cambiar Contraseña</h2>
    </div>
    <div class="bg-white dark:bg-slate-900 rounded-xl border border-soft-grey dark:border-slate-800 p-8">
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-5">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<p class="text-red-500 text-xs mt-1">{{ field.errors|join:", " }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="flex gap-3 mt-8 pt-6 border-t border-soft-grey dark:border-slate-800">
                <button type="submit" class="flex-1 bg-primary text-white py-3 rounded-xl font-bold hover:bg-primary/90 transition-all">Cambiar Contraseña</button>
                <a href="{% url 'usuarios:perfil' %}" class="flex-1 text-center bg-slate-100 dark:bg-slate-800 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-all">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
