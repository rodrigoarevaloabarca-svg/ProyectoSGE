{% extends 'base.html' %}
{% block titulo %}Contraseña Actualizada - SGE{% endblock %}
{% block main %}
<div class="max-w-md mx-auto mt-16 text-center">
    <div class="size-20 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center mx-auto mb-6">
        <span class="material-symbols-outlined text-4xl">check_circle</span>
    </div>
    <h2 class="text-2xl font-bold text-navy-deep dark:text-white mb-2">¡Contraseña actualizada!</h2>
    <p class="text-muted-blue mb-8">Tu contraseña ha sido cambiada exitosamente.</p>
    <a href="{% url 'usuarios:perfil' %}" class="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-xl font-bold hover:bg-primary/90 transition-all">
        <span class="material-symbols-outlined text-sm">arrow_back</span> Volver al perfil
    </a>
</div>
{% endblock %}
