<!--
  BADGE DE NOTIFICACIONES PARA base.html
  =======================================
  Busca en tu navbar el bloque donde están los iconos de usuario/perfil
  y agrega este bloque ANTES del botón de perfil/avatar.

  El `notif_count` viene automáticamente del context_processor.
-->

<!-- Botón notificaciones con badge -->
<a href="{% url 'notificaciones:bandeja' %}"
   class="relative flex items-center justify-center size-9 rounded-xl
          bg-white dark:bg-slate-900 border border-soft-grey dark:border-slate-700
          text-muted-blue hover:text-primary hover:border-primary transition-all"
   title="Notificaciones">
    <span class="material-symbols-outlined text-xl">notifications</span>
    {% if notif_count %}
    <span class="absolute -top-1.5 -right-1.5 flex items-center justify-center
                 min-w-[18px] h-[18px] px-1 rounded-full bg-red-500 text-white
                 text-[10px] font-black leading-none">
        {% if notif_count > 99 %}99+{% else %}{{ notif_count }}{% endif %}
    </span>
    {% endif %}
</a>
